<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>03 - Partes del Rostro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>

<style>
body{
  font-family:sans-serif;
  background:#111;
  color:#eee;
  text-align:center;
  margin:0;
}

/* título */
h2{
  color:#c6ff3a;
  margin-top:15px;
}

/* select + color */
select, input[type="color"]{
  padding:8px;
  margin:8px;
  background:#1a1a1a;
  border:2px solid #333;
  color:#c6ff3a;
  border-radius:8px;
}

/* estado */
#estado{
  color:#c6ff3a;
  margin:10px;
}

/* canvas estilo pro */
canvas{
  display:block;
  margin:auto;
  border:3px solid #333;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>03 · Detección de Partes del Rostro (FaceMesh)</h2>

<select id="parte">
  <option value="leftEye">Ojo izquierdo</option>
  <option value="rightEye">Ojo derecho</option>
  <option value="lips">Boca</option>
  <option value="leftEyebrow">Ceja izquierda</option>
  <option value="rightEyebrow">Ceja derecha</option>
  <option value="faceOval">Contorno del rostro</option>
</select>

<input type="color" id="color" value="#c6ff3a">

<div id="estado">Cargando modelo…</div>

<script>

let video;
let faceMesh;
let rostros = [];

function setup() {
  createCanvas(640, 480);

  video = createCapture(VIDEO);
  video.size(640, 480);
  video.hide();

  faceMesh = ml5.faceMesh({ maxFaces: 1 }, modeloListo);
}

function modeloListo() {
  document.getElementById("estado").textContent =
    "🟢 Detectando rostro en vivo";
    
  faceMesh.detectStart(video, gotFaces);
}

function gotFaces(resultados) {
  rostros = resultados;
}

function draw() {
  background(17); // #111

  if (video) {
    image(video, 0, 0, width, height);
  }

  let parte = document.getElementById("parte").value;
  let color = document.getElementById("color").value;

  for (let cara of rostros) {

    if (cara[parte]) {

      fill(color);
      noStroke();

      for (let p of cara[parte].keypoints) {
        circle(p.x, p.y, 5);
      }
    }
  }
}

</script>

</body>
</html>
