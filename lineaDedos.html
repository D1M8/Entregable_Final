<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>detenccion posicion mano</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
</head>
<body>
  <h1>Deteccion puntos en la manos</h1>
    
  <div>
    <label for="totalmanos">Total manos</label>
    <input type="text" id="totalmanos" readonly>
  </div>

  <div>
    <label for="puntosDerecha">Puntos mano Derecha</label>
    <input type="text" id="puntosDerecha" readonly>
  </div>

  <div>
    <label for="puntosIzquierda">Puntos mano izquierda</label>
    <input type="text" id="puntosIzquierda" readonly>
  </div>
  <script>
    //variable y objetos
    let handPose
    let video
    let hands = []

    //Asignar el modelo
    function preload(){
      handPose = ml5.handPose()
    }

    //Contruir / gestionar UI
    function setup(){
      //Renderizar el video
      createCanvas(640, 480)
      video = createCapture(VIDEO)
      video.size(640, 480)
      video.hide()

      //INiciar deteccion manos
      handPose.detectStart(video, goHands)
    }

    //Render
    function draw(){
      //Para pintar en el canvas[0] utilizamos image()
      image(video, 0, 0, width, height)
      document.getElementById("totalmanos").value = hands.length;
      
      if(!hands.value){
      document.getElementById("puntosDerecha").value = 0
      document.getElementById("puntosIzquierda").value = 0
   }

      for(let i = 0; i < hands.length; i++){
        let hand = hands[i] //Informacion de una sola mano
        if (i === 0) {document.getElementById("puntosDerecha").value = hand.keypoints.length}
        if (i === 1) {document.getElementById("puntosIzquierda").value = hand.keypoints.length}

        for(let j = 0; j < hand.keypoints.length; j++ ){
          let keypoint = hand.keypoints[j]
          fill(0, 255, 0)
          noStroke() //Sin borde, contorno
          circle(keypoint.x, keypoint.y, 10)

        }
      }
    }

    //Resultados
    function goHands(result){
    //Retorna un array con la informacion de la mano/dedos
    //console.log(result)
      hands = result

    }

  </script>  
</body>
</html>
