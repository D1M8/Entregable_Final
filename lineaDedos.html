<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Línea dinámica manos</title>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
</head>

<body>

<script>

let handPose;
let video;
let hands = [];

function preload() {
  handPose = ml5.handPose();
}

function setup() {
  createCanvas(640, 480);

  video = createCapture(VIDEO);
  video.size(640, 480);
  video.hide();

  handPose.detectStart(video, gotHands);
}

function draw() {
  image(video, 0, 0, width, height);

  if (hands.length >= 2) {

    let hand1 = hands[0];
    let hand2 = hands[1];

    let p1 = hand1.keypoints[8]; // índice mano 1
    let p2 = hand2.keypoints[8]; // índice mano 2

    let x1 = p1.x;
    let y1 = p1.y;
    let x2 = p2.x;
    let y2 = p2.y;

    // distancia entre manos
    let d = dist(x1, y1, x2, y2);

    // 🔵 color dinámico según distancia
    // cerca = azul, lejos = rojo
    let r = map(d, 50, 400, 0, 255);
    let b = map(d, 50, 400, 255, 0);

    r = constrain(r, 0, 255);
    b = constrain(b, 0, 255);

    stroke(r, 0, b);

    // grosor dinámico
    let thickness = map(d, 50, 400, 2, 15);
    thickness = constrain(thickness, 2, 15);

    strokeWeight(thickness);

    // línea índice a índice
    line(x1, y1, x2, y2);
  }
}

// recibir datos IA
function gotHands(results) {
  hands = results;
}

</script>

</body>
</html>
