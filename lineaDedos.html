<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>detenccion posicion mano</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
<style>
    body {
      margin: 0;
      background: black;
      color: #c6ff3a;
      text-align: center;
      font-family: Arial;
    }
  </style>
</head>

<body>

<h1>Detección de Índices</h1>

<script>

let handPose;
let video;
let hands = [];

// CARGA DEL MODELO DE MANOS
function preload() {
  handPose = ml5.handPose();
}

// CONFIGURACIÓN INICIAL
function setup() {

  // Crea un canvas de dibujo (640x480)
  createCanvas(640, 480);

  // Captura video de la cámara
  video = createCapture(VIDEO);
  video.size(640, 480);
  video.hide();

  // Inicia detección de manos en el video
  handPose.detectStart(video, gotHands);
}

function draw() {
  background(0);
  image(video, 0, 0, width, height);


  // SOLO SI HAY 2 MANOS DETECTADAS
  if (hands.length >= 2) {
    let dedo1 = hands[0].index_finger_tip;
    let dedo2 = hands[1].index_finger_tip;

    // Calcula la distancia 
    let distancia = dist(
      dedo1.x,
      dedo1.y,
      dedo2.x,
      dedo2.y
    );

    let r = map(distancia, 0, 500, 0, 255);
    let g = map(distancia, 0, 500, 255, 50);
    let b = map(distancia, 0, 500, 255, 255);
    let grosor = map(distancia, 0, 500, 2, 20);

    for (let i = 8; i > 0; i--) {
      stroke(r, g, b, 20); 
      strokeWeight(grosor + i * 2); 

      line(
        dedo1.x, 
        dedo1.y, 
        dedo2.x, 
        dedo2.y  
      );
    }
  
    // LÍNEA PRINCIPAL (BRILLO FUERTE)

    stroke(r, g, b);      
    strokeWeight(grosor);   

    line(
      dedo1.x,
      dedo1.y,
      dedo2.x,
      dedo2.y
    );
  }
}

function gotHands(results) {
  hands = results;
}

</script>

</body>
</html>
